# /etc/sysctl.d/90-tracker.conf
# Kernel tuning for a high-volume BitTorrent tracker.

# --- Default qdisc: fair-queue CoDel ---
# Defaults every interface to fq_codel, which schedules flows fairly and caps
# standing queue latency (CoDel) — so heavy traffic can't build a deep buffer
# that delays everything queued behind it. The `-` prefix ignores failure if a
# kernel ever lacks the fq_codel key.
-net.core.default_qdisc = fq_codel

# --- Conntrack table — up to 2,097,152 tracked connections ---
# A hard ceiling: exceed it and new connections are dropped ("nf_conntrack:
# table full"). Each entry is a 256-byte kernel-slab object (unswappable),
# allocated on demand — so the table costs only what's live, and tops out at
# 512 MiB full. The 524,288-bucket hash index is a fixed 4 MiB at boot;
# buckets = max/4 keeps the hash chains short.
net.netfilter.nf_conntrack_max = 2097152
net.netfilter.nf_conntrack_buckets = 524288

# --- TCP conntrack timeouts ---
# established: how long an idle-but-open TCP flow keeps its slot. The kernel
# default is 5 days, so a flow that goes silent without closing squats a slot for
# most of a week; 7440s (~2h) is ample for short tracker flows and clears such
# zombies far sooner.
# time_wait: how long a closed connection lingers tracked. A tracker's rapid
# announce churn makes closed-connection TIME_WAIT the conntrack table's biggest
# occupant, so cutting this from the 120s default to 30s shrinks that pool to a
# quarter.
net.netfilter.nf_conntrack_tcp_timeout_established = 7440
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30

# --- UDP conntrack timeouts ---
# How long a UDP flow keeps its conntrack slot: 30s before a reply arrives (the
# kernel default), and 180s once traffic has gone both ways. The 180 is longer
# than the kernel's 120s default on purpose — a conservative window that keeps a
# quiet-but-still-live UDP flow tracked rather than dropping it early; the large
# conntrack_max easily absorbs the extra residency. A tracker's own announce
# ports are cut far shorter by a per-flow conntrack rule, so this global mostly
# governs other UDP on the box.
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 180

# --- UDP socket buffers ---
# rmem/wmem_max raise the ceiling a socket may request to 25 MiB; the defaults
# hand every socket 1 MiB up front. The UDP tracker takes a flood of small
# announce packets, and whatever overflows the receive buffer between reads is
# dropped silently — the deep buffer absorbs bursts so announces aren't lost.
net.core.rmem_max = 26214400
net.core.wmem_max = 26214400
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576

# --- NIC receive backlog ---
# The queue between the NIC driver and the IP stack, for packets that arrive
# faster than the stack drains them. 10000 (up from the 1000 default) gives a
# high packet-rate tracker room to ride out an inbound burst without the kernel
# dropping at the ingress queue.
net.core.netdev_max_backlog = 10000

# --- Forwarding ---
# Needed when the host routes traffic between interfaces or runs the tracker in
# containers (Docker requires forwarding for container networking). Set here so
# it persists even when Docker is stopped.
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1
