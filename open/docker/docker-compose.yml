# Example Docker Compose file for Aquatic BitTorrent tracker
#
# This brings up three tracker containers: UDP, HTTP, and WebSocket.
# Adjust ports, memory limits, and file paths to match your setup.
#
# Prerequisites:
#   - Kernel tuning applied (see ../README.md, "Server preparation")
#   - seccomp-iouring.json in the same directory as this file
#   - TOML config files in the same directory as this file
#   - A reverse proxy routing HTTPS traffic to the HTTP and
#     WebSocket containers on localhost (nginx, HAProxy + Caddy,
#     or equivalent — see ../README.md)
#
# Usage:
#   docker compose build
#   docker compose up -d

# Explicit project name. Without this, Docker Compose derives the project
# name from the directory, which produces container names that depend on
# where the files live. Setting it here means the containers are always
# named ftorrent-open-udp-1, ftorrent-open-http-1, etc.
name: ftorrent-open

# Named network with IPv6 support. The UDP container publishes directly
# to the internet (no reverse proxy), so Docker needs to create ip6tables
# DNAT rules for IPv6 clients to reach it. Docker only creates those rules
# if the container has an IPv6 address, which requires enable_ipv6 and an
# IPv6 subnet on the network. Without this, IPv6 UDP packets are silently
# dropped — no error, no log.
#
# The IPv6 subnet is ULA (private, fd00::/8) — it exists only so Docker
# assigns addresses and creates DNAT rules. The specific subnets can be
# changed as long as they don't conflict with other Docker networks or
# host routes.
#
# The `name: ftorrent-open` line gives the network an explicit external
# name. Without it, Docker Compose would create a network called
# "ftorrent-open_tracker" (project name + network key). The explicit name
# is shorter and matches the deployment pattern for reference commands.
networks:
  tracker:
    name: ftorrent-open
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
        - subnet: fd00:cafe:2::/64

services:

  # UDP tracker (BEP 15) — the primary protocol for desktop BitTorrent clients.
  # Uses mio/epoll, no io_uring, runs under Docker's default seccomp profile.
  #
  # Published on all interfaces — UDP bypasses the reverse proxy entirely.
  # External port 443/udp maps to internal 8443 (above 1024, no caps needed).
  # Port 443/udp blends with QUIC/HTTP/3 traffic, making it hard for
  # restrictive firewalls to block without breaking modern web browsing.
  aquatic-udp:
    container_name: ftorrent-open-udp-1
    build:
      context: .
      dockerfile: Dockerfile.udp
    networks:
      - tracker
    ports:
      - "443:8443/udp"
    user: "65534:65534"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2001m
          pids: 64
    restart: unless-stopped

  # HTTP tracker (BEP 3) — for clients behind restrictive firewalls.
  # Uses glommio/io_uring — requires custom seccomp profile and memlock ulimit.
  #
  # Published on localhost only — the reverse proxy handles TLS
  # and forwards /announce and /scrape requests to this container.
  # Not directly reachable from the internet.
  aquatic-http:
    container_name: ftorrent-open-http-1
    build:
      context: .
      dockerfile: Dockerfile.http
    networks:
      - tracker
    ports:
      - "127.0.0.1:8081:8081/tcp"
    user: "65534:65534"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=seccomp-iouring.json
    ulimits:
      # -1 = unlimited locked memory: glommio grows the io_uring ring under
      # load, and a fixed ceiling it outgrows crashes the worker. The cgroup
      # memory limit still bounds total RAM. See README, "io_uring".
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          memory: 2002m
          pids: 64
    restart: unless-stopped

  # WebSocket tracker — for WebTorrent browser clients and WebRTC signaling.
  # Uses glommio/io_uring — requires custom seccomp profile and memlock ulimit.
  #
  # Not directly reachable from the internet — the reverse proxy handles TLS
  # and WebSocket upgrades, forwarding to this container. Unlike the HTTP
  # tracker, the proxy must reach this container over BOTH IP families:
  # aquatic_ws has no X-Forwarded-For support and classifies each peer's
  # family from the accepted TCP socket, so the proxy dials IPv4 for IPv4
  # clients and IPv6 for IPv6 clients (family-preserving proxying). The IPv4
  # dial uses the localhost publish below, same as the HTTP tracker. The
  # IPv6 dial goes directly to the container's pinned ULA address
  # ([fd00:cafe:2::82]:8082) — a loopback publish won't do for IPv6: with
  # the userland proxy disabled, published ports aren't reachable via ::1,
  # and upstream notes that receiving both families over loopback is
  # unsupported anyway. The pinned address is private (ULA, never routed),
  # unreachable from outside the host, and stable for the proxy config to
  # reference. This example pins only this one container, and picks a high
  # address on purpose: Docker's dynamic allocator hands out low addresses
  # (::2, ::3, ...) first, so a high pin can't collide with one already
  # dynamically assigned. A deployment whose firewall rules target
  # containers by address may pin every container in the project instead —
  # then any free addresses work, since nothing is dynamic.
  aquatic-ws:
    container_name: ftorrent-open-ws-1
    build:
      context: .
      dockerfile: Dockerfile.ws
    networks:
      tracker:
        ipv6_address: fd00:cafe:2::82
    ports:
      - "127.0.0.1:8082:8082/tcp"
    user: "65534:65534"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=seccomp-iouring.json
    ulimits:
      # -1 = unlimited locked memory: glommio grows the io_uring ring under
      # load, and a fixed ceiling it outgrows crashes the worker. The cgroup
      # memory limit still bounds total RAM. See README, "io_uring".
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          memory: 2003m
          pids: 64
    restart: unless-stopped
