# /opt/good.ftorrent.com/coturn/turnserver.conf — plain STUN only (no TURN,
# no TCP, no TLS) for stun.ftorrent.com. Mounted read-only into the coturn
# container at /etc/coturn/turnserver.conf. coturn answers STUN binding
# requests — address reflection over UDP 3478, both families — and nothing else.
#
# coturn sits behind Docker's 1:1 DNAT, so it knows only its private container
# address. Plain STUN binding is unaffected (XOR-MAPPED-ADDRESS is the client's
# own address, preserved through DNAT by userland-proxy=false), so no
# external-ip is set — that only matters to RFC 5780's OTHER-ADDRESS
# advertisement, which is off here. If the RFC 5780 filtering tier is ever
# built, it arrives as its own work: a second same-family address, an
# external-ip line, an address-rotation hook, and the reopened ports.

# STUN listening port. Docker DNATs the public UDP 3478 to the container;
# coturn listens on all its interfaces (no listening-ip pin).
listening-port=3478

# STUN only. stun-only refuses every TURN ALLOCATE — it alone is our no-relay
# control. One transport: UDP. TCP, TLS, and DTLS client listeners are all
# off, and RFC 5780 (which would bind the alternate port) is explicitly
# disabled rather than left to coturn's runtime auto-disable.
stun-only
no-tcp
no-tls
no-dtls
no-rfc5780

# Binding requests need no authentication.
no-auth

# coturn wants a realm even STUN-only.
realm=stun.ftorrent.com

# Hardening / hygiene.
no-cli
no-multicast-peers
fingerprint
log-file=stdout

# read_only rootfs — keep the pidfile on the tmpfs.
pidfile=/var/tmp/turnserver.pid
